<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Aid • Prompting AI Generatif • Pusbangkom MKMB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100">

  <!-- Header -->
  <header class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-teal-800 rounded-xl flex items-center justify-center">
          <i class="fa-solid fa-graduation-cap text-white text-sm"></i>
        </div>
        <div>
          <div class="font-semibold text-teal-900 text-lg leading-tight">Job Aid</div>
          <div class="text-xs text-teal-600 -mt-0.5">PUSBANGKOM MKMB</div>
        </div>
      </div>

      <a href="job-aid-pusbangkom.pdf" download
         class="flex items-center gap-2 bg-teal-700 hover:bg-teal-800 text-white px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-download"></i>
        <span>Download PDF</span>
      </a>
    </div>
  </header>

  <!-- Info -->
  <div class="max-w-5xl mx-auto px-4 pt-5 pb-3">
    <h1 class="text-xl font-semibold text-slate-800">Job Aid - Prompting AI Generatif</h1>
    <p class="text-sm text-slate-500 mt-0.5">13 Halaman • Ver. 1.0</p>
  </div>

  <!-- PDF Viewer (Google) -->
  <div class="max-w-5xl mx-auto px-4 pb-10">
    <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-slate-200" style="height: 80vh;">
      <iframe 
        src="https://docs.google.com/gview?url=https://notsyam.github.io/jobaid.github.io/job-aid-pusbangkom.pdf&embedded=true"
        style="width:100%; height:100%; border:none;"
        frameborder="0">
      </iframe>
    </div>
    
    <p class="text-center text-xs text-slate-400 mt-3">
      Jika PDF tidak muncul, silakan klik tombol <b>Download PDF</b> di atas.
    </p>
  </div>

</body>
</html>
