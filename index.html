<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Aid • Prompting AI Generatif • Pusbangkom MKMB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', system_ui, sans-serif; }
    .heading-font { font-family: 'Poppins', system_ui, sans-serif; }
    .pdf-page {
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      margin-bottom: 24px;
      border-radius: 8px;
      overflow: hidden;
    }
    #pdf-container {
      max-width: 900px;
      margin: 0 auto;
    }
  </style>
</head>
<body class="bg-slate-100">
  <!-- Header -->
  <header class="bg-white border-b sticky top-0 z-50">
    <div class="max-w-screen-xl mx-auto px-5 py-4 flex items-center justify-between">
      <div class="flex items-center gap-x-3">
        <div class="w-9 h-9 bg-teal-800 rounded-2xl flex items-center justify-center">
          <i class="fa-solid fa-graduation-cap text-white"></i>
        </div>
        <div>
          <span class="heading-font font-semibold text-xl text-teal-900">Job Aid</span>
          <span class="text-sm text-teal-600 block -mt-1">PUSBANGKOM MKMB</span>
        </div>
      </div>

      <div class="flex items-center gap-x-2">
        <button onclick="downloadPDF()" 
                class="flex items-center gap-x-2 bg-teal-700 hover:bg-teal-800 text-white px-5 py-2.5 rounded-3xl text-sm font-semibold transition-colors">
          <i class="fa-solid fa-download"></i>
          <span class="hidden sm:inline">Download PDF</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Info -->
  <div class="max-w-screen-xl mx-auto px-5 pt-6 pb-4">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="heading-font text-2xl font-semibold text-slate-800">Job Aid - Prompting AI Generatif</h1>
        <p class="text-slate-500 text-sm">13 Halaman • Ver. 1.0</p>
      </div>
      <div id="page-info" class="text-sm text-slate-500 font-medium hidden sm:block">
        Loading...
      </div>
    </div>
  </div>

  <!-- PDF Viewer -->
  <div class="max-w-screen-xl mx-auto px-5 pb-10">
    <div id="pdf-container" class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
      <!-- PDF pages will be rendered here by PDF.js -->
    </div>
    
    <p class="text-center text-xs text-slate-400 mt-4">
      PDF dirender menggunakan PDF.js • Tampilan optimal di HP &amp; Desktop
    </p>
  </div>

  <script src="pdf.js"></script>
  <script>
    const pdfUrl = 'job-aid-pusbangkom.pdf';
    let pdfDoc = null;

    async function renderPDF() {
      const container = document.getElementById('pdf-container');
      container.innerHTML = `
        <div class="flex flex-col items-center justify-center py-12 text-slate-400">
          <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
          <p>Memuat dokumen...</p>
        </div>
      `;

      try {
        // Set worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'pdf.worker.js';

        // Load PDF
        const loadingTask = pdfjsLib.getDocument(pdfUrl);
        pdfDoc = await loadingTask.promise;

        container.innerHTML = '';
        document.getElementById('page-info').innerHTML = `Total: ${pdfDoc.numPages} halaman`;
        document.getElementById('page-info').classList.remove('hidden');

        // Render semua halaman
        for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
          const page = await pdfDoc.getPage(pageNum);
          
          const viewport = page.getViewport({ scale: 1.5 }); // scale 1.5 = cukup tajam di HP
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          canvas.className = 'pdf-page w-full max-w-full';

          const renderContext = {
            canvasContext: context,
            viewport: viewport
          };

          await page.render(renderContext).promise;

          // Tambah nomor halaman kecil
          const pageLabel = document.createElement('div');
          pageLabel.className = 'text-center text-xs text-slate-400 mt-1 mb-4';
          pageLabel.innerHTML = `Halaman ${pageNum} / ${pdfDoc.numPages}`;

          const wrapper = document.createElement('div');
          wrapper.appendChild(canvas);
          wrapper.appendChild(pageLabel);

          container.appendChild(wrapper);
        }

      } catch (error) {
        console.error(error);
        container.innerHTML = `
          <div class="text-center py-10 text-red-500">
            <i class="fa-solid fa-exclamation-triangle text-3xl mb-3"></i>
            <p>Gagal memuat PDF. Coba refresh halaman.</p>
          </div>
        `;
      }
    }

    function downloadPDF() {
      const link = document.createElement('a');
      link.href = pdfUrl;
      link.download = 'Job_Aid_Prompting_AI_Generatif_Pusbangkom.pdf';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Init
    window.onload = function() {
      if (typeof pdfjsLib === 'undefined') {
        document.getElementById('pdf-container').innerHTML = `
          <div class="text-center py-8 text-red-500">
            File pdf.js belum ditemukan.<br>
            Pastikan pdf.js dan pdf.worker.js ada di folder yang sama.
          </div>
        `;
        return;
      }
      renderPDF();
    }
  </script>
</body>
</html>
